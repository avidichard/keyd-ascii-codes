# keyd: ALT + Ascii Code (MS Windows style) Support
#
# CREATED BY: avidichard
#    DISCORD: avidichard#3985
#
# ABOUT
# -----
# Makes it possible to use ALT+AsciiCode for the most popular French
# accentuated characters as well as a few other examples like backspace,
# enter, pipe, tilde, space and some special characters just for
# demonstration. These codes all use the universal standard ascii codes.
#
# INSTALLATION (Debian or other apt base Linux distro)
# ----------------------------------------------------
# 1. In command line, login as root
# 2. Run these commands to install, run and setup keyd as a background process:
#      apt update
#      apt install -y keyd
#      systemctl daemon-reload
#      systemctl start keyd
#      systemctl enable keyd
# 3. Put this file under this path: /etc/keyd/default.conf
# 4. To apply settings in this file, you need to reload keyd.
#    NOTE: keyd is the process name but the executable is named "keyd.rvaiya".
#    Reload keyd by running this command as root:
#      keyd.rvaiya reload
# 5. Changes are immediate and should be available system-wide.
#
# EXTRA NOTES
# -----------
# These are small trade-off when you mode from Windows to linux but I made sure
# that the trade-offs were minimal and not too hard for your brain to adapt.
#
# 1. keyd does not yet have a "on-key-release" option. This means that as soon
#    as you typed the third number of the ascii code, the character will
#    instantly type itself before you releas the ALT key.
#
# 2. For single and 2 digit ascii codes, you NEED to preceed the number with
#    their leading ZEROS. so ALT+32 becomes ALT+032 and ALT+9 becomes ALT+009.
#
# 3. In windows, you can preceed an ascii code with a ZERO to type non-standard
#    characters. This file permits the same thing with the exception of using a
#    leading 5 instead of 0. For example, the bullet character which is normally
#    done by ALT+0149 becomes ALT+5149. This file only contains the bullet
#    character support.
#
# FINAL NOTE AND DISTRIBUTION RIGHTS
# ----------------------------------
# You can by all means extend this file, change it and resdeistribute it as you
# wish. Linux is free, keyd is free, so is this file. It's a proof of concept
# that works for my personal needs. If you have other needs or you want to take time
# and support the entire 255 characters of the standard ascii table, please be
# welcomed.

# Use on all keyboards, just leave this as is or consult the keyd documentation
# if you need to use specific keyboards on your system.
[ids]
*

# Detect both ALT keys
[main]
leftalt = layer(ascii_code)
rightalt = layer(ascii_code)

[ascii_code:A]
kp0 = swap(num0)
kp1 = swap(num1)
kp2 = swap(num2)
# Ascii table is 255 characters so the #5 is for non-standard characters
kp5 = swap(ascii_special)

[num0]
kp0 = swap(num00)
kp1 = swap(num01)
kp2 = swap(num02)
kp3 = swap(num03)
kp9 = swap(num09)

[num00]
kp1 = swapm(ascii_done, macro(C-S-u 2 6 3 a enter))
kp2 = swapm(ascii_done, macro(C-S-u 2 6 3 b enter))
kp3 = swapm(ascii_done, macro(C-S-u 2 6 6 5 enter))
kp4 = swapm(ascii_done, macro(C-S-u 2 6 6 6 enter))
kp5 = swapm(ascii_done, macro(C-S-u 2 6 6 3 enter))
kp6 = swapm(ascii_done, macro(C-S-u 2 6 6 0 enter))

[num01]
kp1 = swapm(ascii_done, macro(C-S-u 2 6 4 2 enter))
kp2 = swapm(ascii_done, macro(C-S-u 2 6 4 0 enter))
kp3 = swapm(ascii_done, macro(C-S-u 2 6 6 a enter))
kp4 = swapm(ascii_done, macro(C-S-u 2 6 6 b enter))
kp5 = swapm(ascii_done, macro(C-S-u 2 6 3 c enter))
kp6 = swapm(ascii_done, macro(C-S-u 2 5 b a enter))
kp7 = swapm(ascii_done, macro(C-S-u 2 5 c 4 enter))
kp9 = swapm(ascii_done, macro(C-S-u 2 0 3 c enter))

[num02]
kp0 = swapm(ascii_done, macro(C-S-u 0 0 b 6 enter))

[num03]
kp0 = swapm(ascii_done, macro(C-S-u 2 5 b 2 enter))
kp1 = swapm(ascii_done, macro(C-S-u 2 5 b c enter))
kp2 = swapm(ascii_done, macro(space))

[num09]
kp2 = swapm(ascii_done, macro(C-S-u 0 0 5 c enter))

[num1]
kp2 = swap(num12)
kp3 = swap(num13)
kp4 = swap(num14)
kp5 = swap(num15)
kp6 = swap(num16)
kp7 = swap(num17)
kp8 = swap(num18)

[num2]
kp1 = swap(num21)
kp2 = swap(num22)
kp3 = swap(num23)
kp4 = swap(num24)

[num12]
kp4 = swapm(ascii_done, macro(C-S-u 0 0 7 c enter))
kp6 = swapm(ascii_done, macro(C-S-u 0 0 7 e enter))
kp8 = swapm(ascii_done, macro(C-S-u 0 0 c 7 enter))

[num13]
kp0 = swapm(ascii_done, macro(C-S-u 0 0 e 9 enter))
kp1 = swapm(ascii_done, macro(C-S-u 0 0 e 2 enter))
kp3 = swapm(ascii_done, macro(C-S-u 0 0 e 0 enter))
kp5 = swapm(ascii_done, macro(C-S-u 0 0 e 7 enter))
kp6 = swapm(ascii_done, macro(C-S-u 0 0 e a enter))
kp7 = swapm(ascii_done, macro(C-S-u 0 0 e b enter))
kp8 = swapm(ascii_done, macro(C-S-u 0 0 e 8 enter))
kp9 = swapm(ascii_done, macro(C-S-u 0 0 e f enter))

[num14]
kp0 = swapm(ascii_done, macro(C-S-u 0 0 e e enter))
kp4 = swapm(ascii_done, macro(C-S-u 0 0 c 9 enter))
kp7 = swapm(ascii_done, macro(C-S-u 0 0 f 4 enter))
kp8 = swapm(ascii_done, macro(C-S-u 0 0 f 6 enter))

[num15]
kp0 = swapm(ascii_done, macro(C-S-u 0 0 f b enter))
kp1 = swapm(ascii_done, macro(C-S-u 0 0 f 9 enter))
kp3 = swapm(ascii_done, macro(C-S-u 0 0 d 6 enter))
kp8 = swapm(ascii_done, macro(C-S-u 0 0 d 7 enter))

[num16]
kp7 = swapm(ascii_done, macro(C-S-u 0 0 b a enter))
kp9 = swapm(ascii_done, macro(C-S-u 0 0 a e enter))

[num17]
kp4 = swapm(ascii_done, macro(C-S-u 0 0 a b enter))
kp5 = swapm(ascii_done, macro(C-S-u 0 0 b b enter))

[num18]
kp2 = swapm(ascii_done, macro(C-S-u 0 0 c 2 enter))
kp3 = swapm(ascii_done, macro(C-S-u 0 0 c 0 enter))
kp4 = swapm(ascii_done, macro(C-S-u 0 0 a 9 enter))
kp9 = swapm(ascii_done, macro(C-S-u 0 0 a 2 enter))

[num21]
kp0 = swapm(ascii_done, macro(C-S-u 0 0 c a enter))
kp1 = swapm(ascii_done, macro(C-S-u 0 0 c b enter))
kp2 = swapm(ascii_done, macro(C-S-u 0 0 c 8 enter))

[num22]
kp6 = swapm(ascii_done, macro(C-S-u 0 0 d 4 enter))

[num23]
kp5 = swapm(ascii_done, macro(C-S-u 0 0 d 9 enter))

[num24]
kp3 = swapm(ascii_done, macro(C-S-u 0 0 b e enter))
kp6 = swapm(ascii_done, macro(C-S-u 0 0 f 7 enter))
kp8 = swapm(ascii_done, macro(C-S-u 0 0 b 0 enter))

# These characters are not part of standard ascii tables or from older tables
[ascii_special]
kp0 = swap(snum0)
kp1 = swap(snum1)

[snum0]
kp1 = swap(snum01)

[snum01]
kp3 = swapm(ascii_done, macro(enter))

[snum1]
kp4 = swap(snum14)

[snum14]
kp9 = swapm(ascii_done, macro(C-S-u 2 0 2 2 enter))

# End of ascii code detection, exit
[ascii_done]
